name: BDD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bdd:
    if: github.repository_owner == 'scaratec'
    runs-on: imap-mcp-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docker compose plugin
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p "$DOCKER_CONFIG/cli-plugins"
          curl -SL https://github.com/docker/compose/releases/download/v2.29.1/docker-compose-linux-x86_64 \
            -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
          chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"
          docker compose version

      - name: Install server
        run: |
          cd server
          python -m venv .venv
          .venv/bin/pip install -e .

      - name: Install BDD harness
        run: |
          cd bdd
          python -m venv .venv
          .venv/bin/pip install behave httpx PyYAML

      - name: Start fixtures
        run: |
          cd bdd/docker
          docker compose up -d
          sleep 10

      - name: Run BDD suite
        run: |
          cd bdd
          .venv/bin/behave --no-color --format=progress features/

      - name: Tear down fixtures
        if: always()
        run: |
          cd bdd/docker
          docker compose down -v
