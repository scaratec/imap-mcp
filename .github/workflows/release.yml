name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install python-semantic-release build twine

      - name: Ensure baseline tag exists
        run: |
          if ! git tag --list 'v*' | grep -q .; then
            VERSION=$(python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('server/pyproject.toml').read_text())
          print(d['project']['version'])
          ")
            FIRST=$(git rev-list --max-parents=0 HEAD)
            git tag "v${VERSION}" "$FIRST"
            git push origin "v${VERSION}"
            echo "Created baseline tag v${VERSION} on ${FIRST}"
          fi

      - name: Semantic release — version
        id: semver
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: server
        run: |
          OUTPUT=$(semantic-release version 2>&1) || true
          echo "$OUTPUT"
          if git tag --points-at HEAD | grep -qE "^v[0-9]"; then
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version is already on PyPI
        id: pypi_check
        if: steps.semver.outputs.tagged == 'true'
        working-directory: server
        run: |
          VERSION=$(python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(d['project']['version'])
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/sc-imap-mcp/${VERSION}/json")
          if [ "$HTTP" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${VERSION} already on PyPI — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "v${VERSION} not on PyPI — will publish"
          fi

      - name: Build package
        if: >-
          steps.semver.outputs.tagged == 'true' &&
          steps.pypi_check.outputs.exists == 'false'
        working-directory: server
        run: python -m build

      - name: Publish to PyPI
        if: >-
          steps.semver.outputs.tagged == 'true' &&
          steps.pypi_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: server/dist/
          skip-existing: true

      - name: Create GitHub release
        if: steps.semver.outputs.tagged == 'true'
        working-directory: server
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: semantic-release publish
