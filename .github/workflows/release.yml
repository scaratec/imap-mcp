name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install python-semantic-release build

      - name: Ensure baseline tag exists
        run: |
          if ! git tag --list 'v*' | grep -q .; then
            VERSION=$(python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('server/pyproject.toml').read_text())
          print(d['project']['version'])
          ")
            FIRST=$(git rev-list --max-parents=0 HEAD)
            git tag "v${VERSION}" "$FIRST"
            git push origin "v${VERSION}"
            echo "Created baseline tag v${VERSION} on ${FIRST}"
          fi

      - name: Semantic release — version
        id: semver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: server
        run: |
          OUTPUT=$(semantic-release version 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          elif git tag --points-at HEAD | grep -q "^v"; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.semver.outputs.released == 'true'
        working-directory: server
        run: python -m build

      - name: Publish to PyPI
        if: steps.semver.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: server/dist/
          skip-existing: true

      - name: Create GitHub release
        if: steps.semver.outputs.released == 'true'
        working-directory: server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish
