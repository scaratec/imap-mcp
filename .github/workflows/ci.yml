name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  # mypy is currently tracking a known backlog of typing debt (see the
  # mypy_debt.md note in docs/ — TODO once the file is added). The job
  # is informational so the release gate is not held hostage by it, but
  # the output is visible on every push so the debt cannot grow silently.
  # When the backlog is resolved, drop `continue-on-error` and tighten
  # the invocation back to `--check-untyped-defs`.
  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mypy --check-untyped-defs src/imap_mcp/

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/policy/ -q
