# Minimal Dovecot config for the imap-mcp BDD test fixtures.
# Plain IMAP on port 143 (no TLS). Single passwd-file backend.
# Maildir storage in /srv/mail. IDLE and MOVE extensions enabled.
# This configuration is for localhost tests only and must never be
# used in production.

protocols = imap

# No TLS in the test harness.
ssl = no
disable_plaintext_auth = no

# Listen on IPv4 only, all interfaces inside the container.
listen = *

# Authentication.
auth_mechanisms = plain login
passdb {
  driver = passwd-file
  args = scheme=BLF-CRYPT /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args = /etc/dovecot/users
  default_fields = uid=1000 gid=1000 home=/srv/mail/%n
}

# Mail storage — Maildir++ layout.
mail_location = maildir:/srv/mail/%n/Maildir
mail_home = /srv/mail/%n
mail_uid = 1000
mail_gid = 1000
first_valid_uid = 1000

# Permit folder creation by IMAP clients so tests can seed arbitrary
# folders without touching the container filesystem.
namespace inbox {
  inbox = yes
  separator = /
  # All folders other than INBOX are left to be created explicitly by
  # the BDD harness. No auto-create / auto-subscribe: the feature
  # file is the sole source of truth for which folders exist in a
  # given scenario. System folders (Drafts, Sent, Trash) are created
  # on demand by scenarios that require them; Dovecot still recognises
  # their special-use flags so STORE/MOVE behave correctly.
  mailbox Drafts {
    auto = no
    special_use = \Drafts
  }
  mailbox Trash {
    auto = no
    special_use = \Trash
  }
  mailbox Sent {
    auto = no
    special_use = \Sent
  }
}

# IMAP service.
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

# Log to stdout so docker-compose captures it.
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# Enable useful extensions.
mail_plugins = acl imap_acl
protocol imap {
  mail_plugins = $mail_plugins imap_acl
  # IDLE is enabled by default. Nothing else required.
}

# Keep auth attempts fast; this is a test environment.
auth_cache_size = 0
auth_failure_delay = 0
auth_verbose = yes
